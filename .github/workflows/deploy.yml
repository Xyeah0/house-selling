name: Deploy to CloudBase Static Hosting

on:
  push:
    branches:
      - master # 本仓库主分支是 master（不是 main）
  workflow_dispatch: # 可在 GitHub Actions 页手动点 Run workflow

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate CloudBase secrets
      run: |
        missing=0
        [ -z "${{ secrets.TCB_SECRET_ID }}" ] && echo "::error::缺少 GitHub Secret: TCB_SECRET_ID（腾讯云 SecretId）" && missing=1
        [ -z "${{ secrets.TCB_SECRET_KEY }}" ] && echo "::error::缺少 GitHub Secret: TCB_SECRET_KEY（腾讯云 SecretKey）" && missing=1
        [ -z "${{ secrets.TCB_ENV_ID }}" ] && echo "::error::缺少 GitHub Secret: TCB_ENV_ID（CloudBase 环境 ID）" && missing=1
        [ "$missing" -eq 1 ] && exit 1

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm' # 启用npm缓存加速构建

    - name: Install dependencies
      run: npm ci # 使用npm ci替代npm install，更适合CI环境

    - name: Build project
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      run: npm run build

    - name: Install CloudBase CLI
      run: npm install -g @cloudbase/cli

    - name: Login CloudBase CLI
      run: tcb login --apiKeyId ${{ secrets.TCB_SECRET_ID }} --apiKey ${{ secrets.TCB_SECRET_KEY }}

    - name: Deploy to CloudBase Static Hosting
      run: tcb hosting deploy ./dist /home -e ${{ secrets.TCB_ENV_ID }} --yes